  <path d="M250 142 L286 142" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M500 142 L536 142" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M730 142 L766 142" stroke="#1d4ed8" stroke-width="3" marker-end="url(#arrow)"/>
