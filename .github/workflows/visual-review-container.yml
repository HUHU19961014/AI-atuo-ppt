name: Visual Review Container

on:
  workflow_dispatch:

jobs:
  visual-review-container-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Build visual-review image
        run: |
          docker compose -f docker/compose.visual-review.yml build

      - name: Run docker fallback preview test
        run: |
          export SIE_AUTOPPT_VISUAL_REVIEW_DOCKER_ENABLED=1
          python -m pytest tests/test_v2_visual_review.py -k docker_fallback -q
